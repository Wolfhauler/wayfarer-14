- type: entity
  parent: BasePDA
  id: NFPrisonerPDA # Frontier: add NF prefix
  name: prisoner PDA
  description: For those who have fallen afoul of the law.
  components:
  - type: Pda
    id: NFPrisonerIDCard # Frontier: PrisonerIDCard < NFPrisonerIDCard
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-prisoner
  - type: Icon
    state: pda-prisoner

- type: entity
  parent: BasePDA
  id: ValetPDA
  name: valet PDA
  description: Transporting people, it's courier but you can chat to the cargo.
  components:
  - type: Pda
    id: ValetNFIDCard # Frontier: ValetIDCard<ValetNFIDCard
  - type: Appearance
    appearanceDataInit:
      enum.PdaVisuals.PdaType:
        !type:String
        pda-valet
  - type: PdaBorderColor
    borderColor: "#860000"
    accentVColor: "#F2F2F2"
  - type: Icon
    state: pda-valet

